---
# Test configuration for maidesite_desk component
# This file validates all component features and configurations

esp32:
  board: esp32dev
  framework:
    type: esp-idf

esphome:
  name: test-maidesite-desk-full
  friendly_name: "Test Maidesite Desk Full"

logger:
  level: DEBUG

external_components:
  - source:
      type: local
      path: ../../components
    components: [maidesite_desk]

uart:
  - id: uart_desk
    tx_pin: GPIO3
    rx_pin: GPIO4
    baud_rate: 9600

# Test basic configuration
maidesite_desk:
  id: my_desk
  uart_id: uart_desk
  log_uart_msg: true

# Test all sensor types
sensor:
  - platform: maidesite_desk
    height_abs:
      name: "Height Absolute"
    height_pct:
      name: "Height Percent"
    height_min:
      name: "Height Minimum"
    height_max:
      name: "Height Maximum"
    position_m1:
      name: "Memory Position M1"
    position_m2:
      name: "Memory Position M2"
    position_m3:
      name: "Memory Position M3"
    position_m4:
      name: "Memory Position M4"

# Test all number controls
number:
  - platform: maidesite_desk
    height_abs:
      name: "Height Absolute Control"
      mode: SLIDER
    height_pct:
      name: "Height Percent Control"
      mode: SLIDER

# Test all button controls
button:
  - platform: maidesite_desk
    stop:
      name: "Stop Movement"
    step_up:
      name: "Step Up"
    step_down:
      name: "Step Down"
    goto_max:
      name: "Go to Maximum Height"
    goto_min:
      name: "Go to Minimum Height"
    goto_m1:
      name: "Go to Memory 1"
    goto_m2:
      name: "Go to Memory 2"
    goto_m3:
      name: "Go to Memory 3"
    goto_m4:
      name: "Go to Memory 4"
    save_m1:
      name: "Save Memory 1"
    save_m2:
      name: "Save Memory 2"
    save_m3:
      name: "Save Memory 3"
    save_m4:
      name: "Save Memory 4"